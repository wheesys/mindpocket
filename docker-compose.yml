# MindPocket Docker Compose 配置
# 使用外部 PostgreSQL 数据库

services:
  # MindPocket Web 应用
  mindpocket-app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: mindpocket-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # 应用配置
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      PORT: 3000

      # 数据库配置（从环境变量读取）
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}

      # 认证配置
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}

      # 存储配置
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_LOCAL_PATH: /data/uploads
      STORAGE_PUBLIC_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}/files

      # S3/MinIO 配置（使用 S3/MinIO 时需要）
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-mindpocket}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}

      # Redis 配置（可选）
      REDIS_URL: ${REDIS_URL}

      # AI 配置
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}

      # 日志配置
      LOG_DIR: /logs

      # 时区
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      # 持久化上传文件（本地存储模式）
      - ./data/uploads:/data/uploads
      # 日志目录
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  # 不再使用命名卷，改用本地目录挂载
  # upload_data:
  #   driver: local

networks:
  default:
    name: mindpocket-network
